<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مروحتي 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --yellow:#F9D923;
  --sky:#7EC8E3;
  --purple:#C9B1FF;
  --mint:#A8E6CF;
  --cream:#FFF8E7;
  --dark:#1a1a2e;
}
body{font-family:'Tajawal',sans-serif;overflow:hidden;width:100vw;height:100vh;background:var(--dark);}
.page{position:absolute;inset:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease;opacity:0;pointer-events:none;overflow:hidden;}
.page.active{opacity:1;pointer-events:all;}

/* ===== PAGE 1: DREAMY GATEWAY ===== */
#page1{background:linear-gradient(135deg,#fce4ec 0%,#f8bbd0 20%,#e1bee7 40%,#c5cae9 60%,#b3e5fc 80%,#b2dfdb 100%);}
.cloud{position:absolute;background:white;border-radius:50px;opacity:0.9;animation:floatCloud linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
.cloud-1{width:200px;height:60px;top:15%;animation-duration:25s;animation-delay:-5s;}
.cloud-1::before{width:100px;height:80px;top:-40px;right:30px;}
.cloud-1::after{width:60px;height:60px;top:-30px;right:80px;}
.cloud-2{width:300px;height:80px;top:30%;animation-duration:30s;animation-delay:-12s;}
.cloud-2::before{width:130px;height:100px;top:-50px;right:40px;}
.cloud-2::after{width:80px;height:70px;top:-35px;right:100px;}
.cloud-3{width:180px;height:55px;top:55%;animation-duration:20s;animation-delay:-8s;}
.cloud-3::before{width:90px;height:70px;top:-35px;right:25px;}
.cloud-3::after{width:55px;height:55px;top:-25px;right:70px;}
.cloud-4{width:250px;height:70px;top:70%;animation-duration:28s;animation-delay:-3s;}
.cloud-4::before{width:110px;height:90px;top:-45px;right:35px;}
.cloud-4::after{width:70px;height:65px;top:-30px;right:90px;}
.cloud-5{width:220px;height:65px;top:5%;animation-duration:22s;animation-delay:-15s;}
.cloud-5::before{width:100px;height:85px;top:-42px;right:32px;}
.cloud-5::after{width:65px;height:58px;top:-28px;right:75px;}
@keyframes floatCloud{from{left:-350px;}to{left:110%;}  }
.gateway-content{position:relative;z-index:10;text-align:center;}
.gateway-title{font-size:clamp(3rem,10vw,7rem);font-family:'Amiri',serif;color:#5c3d6e;text-shadow:0 4px 20px rgba(255,255,255,0.8);animation:titlePulse 3s ease-in-out infinite;}
.gateway-subtitle{font-size:clamp(1rem,3vw,1.5rem);color:#7b5e8a;margin-top:0.5rem;letter-spacing:3px;}
.gateway-date{font-size:clamp(0.9rem,2.5vw,1.2rem);color:#9c7aaa;margin-top:0.3rem;font-weight:300;}
@keyframes titlePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
.key-btn{margin-top:3rem;background:none;border:none;cursor:pointer;animation:keyFloat 2s ease-in-out infinite;}
.key-icon{font-size:clamp(3rem,8vw,5rem);filter:drop-shadow(0 4px 15px rgba(200,150,255,0.6));transition:transform 0.3s;}
.key-btn:hover .key-icon{transform:rotate(20deg) scale(1.2);}
.key-hint{font-size:0.9rem;color:#9c7aaa;margin-top:0.5rem;opacity:0.8;}
@keyframes keyFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
#page1.dissolving .cloud{animation-duration:0.8s;opacity:0;transition:opacity 0.8s;}
#page1.dissolving{background:white;transition:background 1s ease;}

/* ===== PAGE 2: SECRET SLIDER ===== */
#page2{background:linear-gradient(160deg,#0a0a1a 0%,#0d1b35 50%,#0a0a1a 100%);overflow:hidden;}
.stars-bg{position:absolute;inset:0;}
.star-dot{position:absolute;background:white;border-radius:50%;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}
.p2-content{position:relative;z-index:5;text-align:center;width:90%;max-width:600px;}
.p2-title{font-size:clamp(1.5rem,5vw,3rem);color:var(--purple);font-family:'Amiri',serif;margin-bottom:0.5rem;opacity:0;transition:opacity 1s;}
.p2-subtitle{font-size:clamp(0.9rem,2.5vw,1.1rem);color:var(--sky);opacity:0;transition:opacity 1s 0.3s;margin-bottom:2.5rem;}
.slider-container{opacity:0;transition:opacity 1s 0.6s;}
#page2.loaded .p2-title,#page2.loaded .p2-subtitle,#page2.loaded .slider-container{opacity:1;}
.num-display{font-size:clamp(4rem,15vw,8rem);font-weight:800;color:white;line-height:1;transition:color 0.5s,text-shadow 0.5s;text-shadow:0 0 30px rgba(255,255,255,0.2);}
.num-display.lit{color:var(--yellow);text-shadow:0 0 60px var(--yellow),0 0 100px rgba(249,217,35,0.5);}
.slider-track{position:relative;width:280px;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;margin:1.5rem auto;}
.slider-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--purple),var(--yellow));border-radius:3px;transition:width 0.1s;width:0%;}
#secret-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:transparent;position:absolute;top:0;left:0;margin:0;cursor:pointer;outline:none;}
#secret-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:white;cursor:pointer;box-shadow:0 0 15px rgba(255,255,255,0.8),0 0 30px var(--purple);border:3px solid var(--purple);transition:transform 0.2s,box-shadow 0.2s;}
#secret-slider::-webkit-slider-thumb:hover{transform:scale(1.3);}
.slider-labels{display:flex;justify-content:space-between;margin-top:0.8rem;color:rgba(255,255,255,0.4);font-size:0.8rem;}
.unlock-hint{color:rgba(255,255,255,0.3);font-size:0.85rem;margin-top:1rem;transition:color 0.5s;}
.unlock-hint.glowing{color:var(--yellow);text-shadow:0 0 10px var(--yellow);}
/* flash overlay */
.flash-overlay{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:100;transition:opacity 0.3s;}

/* ===== PAGE 3: POLAROIDS ===== */
#page3{background:linear-gradient(135deg,#fef9f0 0%,#fdf0e0 50%,#fce8d5 100%);cursor:default;}
.polaroid-area{position:relative;width:100%;height:100%;overflow:hidden;}
.polaroid{position:absolute;background:white;padding:12px 12px 50px 12px;box-shadow:0 8px 30px rgba(0,0,0,0.2),0 2px 8px rgba(0,0,0,0.1);cursor:grab;user-select:none;transition:box-shadow 0.2s,transform 0.2s;border-radius:3px;}
.polaroid:active{cursor:grabbing;box-shadow:0 20px 60px rgba(0,0,0,0.35);z-index:100 !important;}
.polaroid-inner{position:relative;width:100%;height:100%;perspective:1000px;}
.polaroid-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);}
.polaroid-front{transform:rotateY(0deg);}
.polaroid-back{transform:rotateY(180deg);background:white;display:flex;align-items:center;justify-content:center;padding:10px;}
.polaroid.flipped .polaroid-front{transform:rotateY(-180deg);}
.polaroid.flipped .polaroid-back{transform:rotateY(0deg);}
.polaroid img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;background:white;}
.polaroid.last-polaroid img{object-fit:contain !important;background:white;width:100%;height:100%;}

.polaroid-caption{position:absolute;bottom:-38px;left:0;right:0;text-align:center;font-family:'Amiri',serif;color:#555;font-size:clamp(0.75rem,1.5vw,0.9rem);font-style:italic;}
.polaroid-back-text{font-family:'Amiri',serif;font-size:clamp(1rem,2.5vw,1.3rem);color:#5c3d6e;text-align:center;line-height:1.6;direction:rtl;}
.p3-hint{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);color:rgba(100,80,130,0.6);font-size:0.8rem;z-index:10;text-align:center;pointer-events:none;}

/* ===== PAGE 4: STARS CONSTELLATION ===== */
#page4{background:radial-gradient(ellipse at center,#0d1b35 0%,#050a15 70%,#000005 100%);cursor:crosshair;}
#star-canvas{position:absolute;inset:0;width:100%;height:100%;}
.p4-ui{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;z-index:5;}
.p4-hint{color:rgba(255,215,100,0.5);font-size:0.85rem;animation:fadeHint 3s ease-in-out infinite;}
@keyframes fadeHint{0%,100%{opacity:0.4;}50%{opacity:0.9;}}
.name-revealed{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Amiri',serif;font-size:clamp(2.5rem,8vw,5rem);color:var(--yellow);text-shadow:0 0 30px var(--yellow),0 0 60px rgba(249,217,35,0.4);opacity:0;transition:opacity 2s;pointer-events:none;text-align:center;z-index:10;}
.name-revealed.show{opacity:1;}
.p4-skip{position:absolute;top:20px;left:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);padding:8px 16px;border-radius:20px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.85rem;transition:all 0.3s;}
.p4-skip:hover{background:rgba(255,255,255,0.2);color:white;}

/* ===== PAGE 5: FINALE ===== */
#page5{background:#7EC8E3;overflow:hidden;}
#fireworks-canvas{position:absolute;inset:0;width:100%;height:100%;}
.finale-content{position:relative;z-index:5;width:90%;max-width:700px;text-align:center;max-height:90vh;overflow-y:auto;padding:2rem 1rem;}
.finale-content::-webkit-scrollbar{width:3px;}
.finale-content::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}
.finale-header{font-family:'Amiri',serif;font-size:clamp(1.8rem,6vw,3.5rem);color:#F9D923;margin-bottom:1rem;text-shadow:0 0 10px rgba(0,0,0,0.25);}
.finale-hearts{font-size:2rem;margin-bottom:1.5rem;animation:heartBeat 1.5s ease-in-out infinite;}
@keyframes heartBeat{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.finale-text{font-family:'Amiri',serif;font-size:clamp(1rem,2.5vw,1.25rem);color:#F9D923;line-height:2.2;direction:rtl;text-align:justify;border-right:3px solid var(--purple);padding-right:1.2rem;}
.cursor-blink{display:inline-block;width:3px;height:1.2em;background:var(--yellow);vertical-align:text-bottom;animation:blink 0.8s step-end infinite;margin-right:2px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.finale-date{margin-top:1.5rem;color:#F9D923;font-size:1rem;opacity:0.8;}
.finale-name{font-family:'Amiri',serif;font-size:clamp(2rem,7vw,4rem);color:#F9D923;text-shadow:none;margin-top:1rem;}

/* ===== NAV DOTS ===== */
.nav-dots{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:1000;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);border:none;cursor:pointer;transition:all 0.3s;padding:0;}
.nav-dot.active{background:var(--yellow);transform:scale(1.3);}

/* Page transitions */
.page{transition:opacity 0.9s ease,transform 0.9s ease;}
.page:not(.active){transform:scale(0.97);}
.page.active{transform:scale(1);}

@media(max-width:600px){
  .polaroid{padding:8px 8px 40px 8px;}
}
</style>
</head>
<body>

<!-- PAGE 1: DREAMY GATEWAY -->
<div id="page1" class="page active">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>
  <div class="cloud cloud-5"></div>
  <div class="gateway-content">
    <div class="gateway-title">مروحتي 🦢</div>
    <div class="gateway-subtitle">✦ لمروحتي حبيبة قلبي ✦</div>
    <div class="gateway-date">١ ديسمبر ٢٠٢٥</div>
    <button class="key-btn" onclick="unlockPage1()">
      <div class="key-icon">🗝️</div>
      <div class="key-hint">اضغطي المفتاح لتفتحي الباب</div>
    </button>
  </div>
</div>

<!-- PAGE 2: SECRET SLIDER -->
<div id="page2" class="page">
  <div class="stars-bg" id="starsContainer"></div>
  <div class="flash-overlay" id="flashOverlay"></div>
  <div class="p2-content">
    <div class="p2-title">🔐 السر</div>
    <div class="p2-subtitle">في تاريخ مهم جداً… شو الشهر + اليوم واليوم؟</div>
    <div class="slider-container">
      <div style="display:flex;gap:20px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem;">
        <div>
          <div style="color:rgba(255,255,255,0.7);margin-bottom:0.5rem;">اليوم</div>
          <select id="daySelect" style="padding:10px 15px;border-radius:12px;border:none;font-size:1rem;">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option>
          </select>
        </div>

        <div>
          <div style="color:rgba(255,255,255,0.7);margin-bottom:0.5rem;">الشهر</div>
          <select id="monthSelect" style="padding:10px 15px;border-radius:12px;border:none;font-size:1rem;">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
          </select>
        </div>
      </div>

      <div class="unlock-hint" id="unlockHint">اختاري اليوم والشهر الصح...</div>
    </div>
  </div>
</div>

<!-- PAGE 3: POLAROIDS -->
<div id="page3" class="page">
  <div class="polaroid-area" id="polaroidArea"></div>
  <div class="p3-hint">✦ اسحبي الصور • اضغطي عليها لتكتشفي المفاجأة ✦</div>
</div>


<!-- PAGE 4: PASSWORD -->
<div id="page4" class="page">
  <div style="text-align:center;">
    <div style="font-size:clamp(2rem,6vw,4rem);color:#F9D923;font-family:'Amiri',serif;margin-bottom:1rem;">
      🔒 كلمة السر
    </div>

    <div style="color:white;font-size:1.1rem;margin-bottom:1.5rem;">
      اكتبي كلمة السر حتى تكملي ✨
    </div>

    <input 
      type="text" 
      id="passwordInput"
      placeholder="اكتبي كلمة السر"
      style="padding:14px 20px;border:none;border-radius:15px;font-size:1rem;text-align:center;min-width:250px;outline:none;"
    />

    <div id="passwordError" style="margin-top:1rem;color:#ffb3b3;opacity:0;transition:0.3s;">
      كلمة السر غلط 💔
    </div>
  </div>
</div>

<!-- PAGE 5: FINALE -->

<div id="page5" class="page">
  <canvas id="fireworks-canvas"></canvas>
  <div class="finale-content">
    <div class="finale-header">مروحتي 🦢</div>
    <div class="finale-hearts">💛🩵💜💚💛🩵💜</div>
    <div class="finale-text" id="finaleText"></div>
    <div class="cursor-blink" id="typeCursor"></div>
    <div class="finale-date" id="finaleDate" style="opacity:0;transition:opacity 2s;">✦ ١ ديسمبر ٢٠٢٥ ✦</div>
    <div class="finale-name" id="finaleName" style="opacity:0;transition:opacity 2s;">مروحتي 💛</div>
  </div>
</div>

<!-- NAV DOTS -->
<div class="nav-dots">
  <button class="nav-dot active" onclick="goToPage(0)"></button>
  <button class="nav-dot" onclick="goToPage(1)"></button>
  <button class="nav-dot" onclick="goToPage(2)"></button>
  <button class="nav-dot" onclick="goToPage(3)"></button>
  <button class="nav-dot" onclick="goToPage(4)"></button>
</div>

// ========== PAGE NAVIGATION ==========
let currentPage = 0;
const pages = document.querySelectorAll('.page');
const dots = document.querySelectorAll('.nav-dot');

function goToPage(n) {
  pages[currentPage].classList.remove('active');
  dots[currentPage].classList.remove('active');
  currentPage = n;
  pages[n].classList.add('active');
  dots[n].classList.add('active');
  if(n === 1) initPage2();
  if(n === 2) initPage3();
  if(n === 3) initPage4();
  if(n === 4) initPage5();
}

// ========== PAGE 1: CLOUDS ==========
function unlockPage1() {
  const p1 = document.getElementById('page1');
  p1.classList.add('dissolving');
  const clouds = p1.querySelectorAll('.cloud');
  clouds.forEach((c,i) => {
    setTimeout(()=>{ c.style.opacity='0'; c.style.transform='scale(1.5)'; c.style.transition='all 1s ease'; }, i*100);
  });
  setTimeout(() => { p1.style.opacity='0'; }, 600);
  setTimeout(() => { goToPage(1); p1.style.opacity='1'; p1.style.background=''; p1.classList.remove('dissolving'); clouds.forEach(c=>{ c.style.opacity=''; c.style.transform=''; }); }, 1500);
}

// ========== PAGE 2: SLIDER ==========
let page2Initialized = false;
function initPage2() {
  if(page2Initialized) return;
  page2Initialized = true;
  // Create twinkling stars
  const container = document.getElementById('starsContainer');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className = 'star-dot';
    const size = Math.random()*3+1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
    container.appendChild(s);
  }
  setTimeout(()=>{ document.getElementById('page2').classList.add('loaded'); }, 100);

  const slider = document.getElementById('secret-slider');
  const display = document.getElementById('numDisplay');
  const fill = document.getElementById('sliderFill');
  const hint = document.getElementById('unlockHint');
  const arabic = ['١','٢','٣','٤','٥','٦','٧','٨','٩','١٠','١١','١٢'];

  slider.addEventListener('input', function(){
    const v = parseInt(this.value);
    display.textContent = arabic[v-1];
    fill.style.width = ((v-1)/11*100)+'%';
    if(v === 12) {
      display.classList.add('lit');
      hint.textContent = '🌟 وجدتيه! ١٢ ... الشهر + اليوم اللي ما رح أنساه!';
      hint.classList.add('glowing');
      setTimeout(()=>{ flashAndGo(); }, 800);
    } else {
      display.classList.remove('lit');
      hint.textContent = 'ابحثي عن الرقم الصح...';
      hint.classList.remove('glowing');
    }
  });
}

function flashAndGo() {
  const flash = document.getElementById('flashOverlay');
  flash.style.opacity = '1';
  setTimeout(()=>{ flash.style.opacity='0'; goToPage(2); }, 600);
}

// ========== PAGE 3: POLAROIDS ==========
let page3Initialized = false;
function initPage3() {
  if(page3Initialized) return;
  page3Initialized = true;
  const area = document.getElementById('polaroidArea');
  const W = window.innerWidth, H = window.innerHeight;

  const positions = [
    {x:0.05,y:0.05,rot:-8},{x:0.28,y:0.03,rot:5},{x:0.55,y:0.02,rot:-4},{x:0.75,y:0.06,rot:7},
    {x:0.10,y:0.50,rot:-6},{x:0.45,y:0.48,rot:3},{x:0.72,y:0.50,rot:-5}
  ];

  const pw = Math.min(160, W*0.22), ph = pw;

  IMAGES.forEach((src,i) => {
    const pol = document.createElement('div');
    pol.className = 'polaroid';
    const pos = positions[i];
    pol.style.cssText = `left:${pos.x*W}px;top:${pos.y*H}px;width:${pw}px;height:${ph+38}px;transform:rotate(${pos.rot}deg);z-index:${i+1};`;

    pol.innerHTML = `
      <div class="polaroid-inner" style="height:${ph}px;">
        <div class="polaroid-face polaroid-front">
          <img src="data:image/jpeg;base64,${src}" alt="photo ${i+1}" style="height:${ph}px;">
        </div>
        <div class="polaroid-face polaroid-back">
          <div class="polaroid-back-text">${CAPTIONS[i]}</div>
        </div>
      </div>
      <div class="polaroid-caption">${i+1} / 7</div>`;

    // Drag functionality
    let isDragging=false, startX, startY, startLeft, startTop;
    pol.addEventListener('mousedown', e=>{
      if(e.target.tagName==='IMG'||e.target.classList.contains('polaroid-inner')||e.target.classList.contains('polaroid-face')||e.target.classList.contains('polaroid-front')) {
        isDragging=true;
        startX=e.clientX; startY=e.clientY;
        startLeft=parseInt(pol.style.left); startTop=parseInt(pol.style.top);
        pol.style.zIndex=99; pol.style.transition='box-shadow 0.2s';
        e.preventDefault();
      }
    });
    document.addEventListener('mousemove', e=>{
      if(!isDragging) return;
      pol.style.left=(startLeft+e.clientX-startX)+'px';
      pol.style.top=(startTop+e.clientY-startY)+'px';
    });
    document.addEventListener('mouseup', e=>{
      if(isDragging){ isDragging=false; }
    });

    // Touch drag
    pol.addEventListener('touchstart', e=>{
      isDragging=true;
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      startLeft=parseInt(pol.style.left); startTop=parseInt(pol.style.top);
      pol.style.zIndex=99;
    },{passive:true});
    pol.addEventListener('touchmove', e=>{
      if(!isDragging) return;
      pol.style.left=(startLeft+e.touches[0].clientX-startX)+'px';
      pol.style.top=(startTop+e.touches[0].clientY-startY)+'px';
      e.preventDefault();
    },{passive:false});
    pol.addEventListener('touchend', e=>{
      isDragging=false;
    });

    // Click to flip
    pol.addEventListener('click', e=>{
      if(Math.abs(parseInt(pol.style.left)-startLeft)<5 && Math.abs(parseInt(pol.style.top)-startTop)<5) {
        pol.classList.toggle('flipped');
      }
    });

    area.appendChild(pol);

    // Scatter animation
    setTimeout(()=>{
      pol.style.transition='transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.5s';
      pol.style.opacity='1';
    }, i*120+100);
  });

  // Next page button
  const nextBtn = document.createElement('button');
  nextBtn.style.cssText='position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(92,61,110,0.8);color:white;border:none;padding:12px 30px;border-radius:25px;font-family:Tajawal,sans-serif;font-size:1rem;cursor:pointer;z-index:200;backdrop-filter:blur(10px);';
  nextBtn.textContent = 'التالي ✨';
  nextBtn.onclick = ()=>goToPage(3);
  area.appendChild(nextBtn);
}

// ========== PAGE 4: STAR CANVAS ==========
let page4Initialized = false;
function initPage4() {
  if(page4Initialized) return;
  page4Initialized = true;
  const canvas = document.getElementById('star-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Background stars
  const bgStars = [];
  for(let i=0;i<200;i++){
    bgStars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.3,a:Math.random(),speed:0.005+Math.random()*0.01});
  }

  // Trail points
  const trail = [];
  let mouseX = canvas.width/2, mouseY = canvas.height/2;
  let frameCount = 0;
  let nameShown = false;

  canvas.addEventListener('mousemove', e=>{
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
    trail.push({x:mouseX,y:mouseY,t:Date.now(),size:Math.random()*3+2});
    if(trail.length > 150) trail.shift();
  });

  canvas.addEventListener('touchmove', e=>{
    const rect = canvas.getBoundingClientRect();
    mouseX = e.touches[0].clientX - rect.left;
    mouseY = e.touches[0].clientY - rect.top;
    trail.push({x:mouseX,y:mouseY,t:Date.now(),size:Math.random()*3+2});
    if(trail.length > 150) trail.shift();
    e.preventDefault();
  },{passive:false});

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    frameCount++;

    // Draw bg stars
    bgStars.forEach(s=>{
      s.a += s.speed * (Math.random()>0.5?1:-1);
      s.a = Math.max(0.1, Math.min(1, s.a));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });

    // Draw golden trail
    const now = Date.now();
    trail.forEach((p,i)=>{
      const age = (now - p.t) / 3000;
      if(age > 1) return;
      const alpha = (1-age) * 0.9;
      const size = p.size * (1-age*0.5);
      // Star shape
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(frameCount*0.01 + i*0.1);
      ctx.beginPath();
      for(let j=0;j<5;j++){
        const angle = (j*4*Math.PI/5) - Math.PI/2;
        const r = j===0?size:size*0.4;
        ctx.lineTo(Math.cos(angle)*size, Math.sin(angle)*size);
        const innerAngle = angle + Math.PI/5;
        ctx.lineTo(Math.cos(innerAngle)*size*0.4, Math.sin(innerAngle)*size*0.4);
      }
      ctx.closePath();
      ctx.fillStyle = `rgba(249,217,35,${alpha})`;
      ctx.shadowColor = '#F9D923';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.restore();

      // Connect nearby points
      if(i > 0) {
        const prev = trail[i-1];
        const dist = Math.hypot(p.x-prev.x,p.y-prev.y);
        if(dist < 40){
          ctx.beginPath();
          ctx.moveTo(prev.x,prev.y);
          ctx.lineTo(p.x,p.y);
          ctx.strokeStyle = `rgba(249,217,35,${alpha*0.4})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    });

    // Show name after enough trail
    if(trail.length > 80 && !nameShown){
      nameShown = true;
      document.getElementById('nameRevealed').classList.add('show');
      setTimeout(()=>{ goToPage(4); }, 4000);
    }

    requestAnimationFrame(draw);
  }
  draw();
}

// ========== PAGE 5: FINALE + FIREWORKS ==========
let page5Initialized = false;
function initPage5() {
  if(page5Initialized) return;
  page5Initialized = true;
  startFireworks();
  typeText();
}

function typeText(){
  const el = document.getElementById('finaleText');
  const cursor = document.getElementById('typeCursor');
  let i = 0;
  const speed = 35;
  function type(){
    if(i < FINAL_TEXT.length){
      el.textContent += FINAL_TEXT[i];
      i++;
      setTimeout(type, speed);
      el.parentElement.scrollTop = el.parentElement.scrollHeight;
    } else {
      cursor.style.display='none';
      setTimeout(()=>{
        document.getElementById('finaleDate').style.opacity='1';
        document.getElementById('finaleName').style.opacity='1';
      }, 800);
    }
  }
  setTimeout(type, 500);
}

// Fireworks
function startFireworks(){
  const canvas = document.getElementById('fireworks-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const colors = ['#F9D923','#7EC8E3','#C9B1FF','#A8E6CF','#FF9AA2','#FFB347','#B5EAD7'];

  function createFirework(x,y){
    const count = 60+Math.floor(Math.random()*40);
    for(let i=0;i<count;i++){
      const angle = (Math.PI*2/count)*i;
      const speed = 1+Math.random()*5;
      particles.push({
        x,y,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        life:1, decay:0.012+Math.random()*0.01,
        size:Math.random()*3+1,
        color:colors[Math.floor(Math.random()*colors.length)],
        gravity:0.05+Math.random()*0.05
      });
    }
  }

  // Auto launch
  function autoLaunch(){
    const x = Math.random()*canvas.width;
    const y = Math.random()*canvas.height*0.6+20;
    createFirework(x,y);
    setTimeout(autoLaunch, 600+Math.random()*1200);
  }
  setTimeout(autoLaunch, 300);
  setTimeout(autoLaunch, 900);
  setTimeout(autoLaunch, 1500);

  function animFW(){
    ctx.fillStyle = 'rgba(5,10,18,0.18)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
      p.vx *= 0.98; p.vy *= 0.98;
      p.life -= p.decay;
      if(p.life <= 0){ particles.splice(i,1); continue; }
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
      ctx.fillStyle = p.color.replace(')',`,${p.life})`).replace('rgb','rgba').replace('#','');
      // simpler approach:
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    requestAnimationFrame(animFW);
  }
  animFW();
}
